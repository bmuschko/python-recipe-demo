name: Moderne Python recipes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  recipe-verification:
    name: recipe-verification (${{ matrix.os }}, CLI ${{ matrix.cli-version }}, Java ${{ matrix.java-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cli-version: "3.57.15"
            java-version: "17"
          - os: ubuntu-latest
            cli-version: "4.0.5"
            java-version: "25"
          - os: windows-latest
            cli-version: "3.57.15"
            java-version: "17"
          - os: windows-latest
            cli-version: "4.0.5"
            java-version: "25"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Moderne CLI
        env:
          MODERNE_CLI_VERSION: ${{ matrix.cli-version }}
        shell: bash
        run: |
          curl -sSL -o mod.jar https://repo1.maven.org/maven2/io/moderne/moderne-cli/${{ env.MODERNE_CLI_VERSION }}/moderne-cli-${{ env.MODERNE_CLI_VERSION }}.jar
          echo '#!/bin/bash' > mod
          echo 'java -jar "'"$GITHUB_WORKSPACE"'/mod.jar" "$@"' >> mod
          chmod +x mod

          cat > mod-run <<'EOF'
          #!/bin/bash
          set -o pipefail
          mod run "$@" 2>&1 | tee output.log
          # Strip carriage-return progress artifacts so overwritten status lines
          # (e.g. "Found 0 errors …") do not cause false-positive matches.
          sed $'s/.*\r//' output.log > output_rendered.log
          if grep -qE "Found [0-9]+ errors while running the recipe\." output_rendered.log; then
            echo "Recipe execution failed with errors"
            exit 1
          fi
          if grep -q "Unable to find recipe" output_rendered.log; then
            echo "Recipe not found"
            exit 1
          fi
          EOF
          chmod +x mod-run

          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Install recipe JAR
        env:
          REWRITE_PYTHON_VERSION: "8.75.7"
        shell: bash
        run: mod config recipes jar install org.openrewrite:rewrite-python:${{ env.REWRITE_PYTHON_VERSION }}

      - name: Install recipe Python packages
        shell: bash
        run: |
          mod config recipes pip install openrewrite
          mod config recipes pip install openrewrite-static-analysis

      - name: Build LST
        shell: bash
        run: mod build . --no-download

      - name: Run PythonSpaces recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.format.PythonSpaces

      - name: Run DependencyInsight recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.search.DependencyInsight -P packageNamePattern="requests*"

      - name: Run UpgradeDependencyVersion recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.UpgradeDependencyVersion -P packageName=requests -P newVersion=">=2.31.0"

      - name: Run AddDependency recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.AddDependency -P packageName=httpx -P version=">=0.25.0"

      - name: Run ChangeDependency recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.ChangeDependency -P oldPackageName=click -P newPackageName=typer -P newVersion=">=0.9.0"

      - name: Run RemoveDependency recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.RemoveDependency -P packageName=ruff -P scope=project.optional-dependencies -P groupName=dev

      - name: Run PythonBestPractices recipe
        shell: bash
        run: mod-run . --recipe=org.openrewrite.python.cleanup.PythonBestPractices
